<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookstore</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: darkblue;
        }
        table {
            width: 80%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .add-button {
            display: inline-block;
            margin-top: 10px;
            margin-bottom: 15px;
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .action-links a {
            margin-right: 10px;
        }
    </style>
</head>
<body>

<h1>📚 Bookstore</h1>

<a class="add-button" th:href="@{/books-ui/new}">➕ Add New Book</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Price (₹)</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="book : ${books}">
        <td th:text="${book.id}">1</td>
        <td th:text="${book.title}">Title</td>
        <td th:text="${book.author}">Author</td>
        <td th:text="${book.price}">100.00</td>
        <td class="action-links">
            <a th:href="@{'/books-ui/edit/' + ${book.id}}">✏️ Edit</a>
            <a th:href="@{'/books-ui/delete/' + ${book.id}}"
               onclick="return confirm('Are you sure you want to delete this book?');">🗑️ Delete</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
